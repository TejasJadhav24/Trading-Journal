<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#050508">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Trading Journal | Elite</title>
    
    <!-- Premium Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-main: #050508;
            --bg-gradient: radial-gradient(circle at 50% 0%, #16162a 0%, #050508 100%);
            --card-glass: rgba(20, 20, 30, 0.6);
            --accent: #7c73e6; --gold: #ffcf40; --green: #10b981; --red: #ef4444;
            --text: #ffffff; --dim: #8e8e93; --border: rgba(255, 255, 255, 0.08);
        }
        
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-main); background-image: var(--bg-gradient); color: var(--text); margin: 0; min-height: 100vh; overflow-x: hidden; }

        /* --- APP NAVIGATION --- */
        .sidebar { 
            width: 85px; height: 100vh; background: rgba(10, 10, 15, 0.6); backdrop-filter: blur(20px);
            border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; 
            padding: 30px 0; position: fixed; left: 0; top: 0; z-index: 2000; 
        }
        .side-logo { margin-bottom: 50px; fill: var(--gold); width: 32px; filter: drop-shadow(0 0 10px rgba(255,207,64,0.3)); }
        .nav-item { 
            color: #555870; font-size: 24px; cursor: pointer; background: none; border: none; 
            margin-bottom: 40px; transition: 0.3s; position: relative; width: 100%; display: flex; justify-content: center;
        }
        .nav-item.active { color: var(--gold); transform: scale(1.1); }
        .nav-item.active::after { 
            content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); 
            width: 4px; height: 28px; background: var(--gold); border-radius: 0 4px 4px 0; box-shadow: 0 0 15px var(--gold); 
        }

        /* --- MAIN LAYOUT --- */
        .main-content { margin-left: 85px; padding: 30px 25px; max-width: 1200px; margin-right: auto; }
        
        .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .brand-section h1 { margin: 0; font-weight: 800; letter-spacing: -0.5px; font-size: 22px; }
        .brand-quote { margin-top: 4px; font-size: 12px; color: var(--dim); }
        .top-fund-display { font-weight: 800; color: var(--green); background: rgba(16, 185, 129, 0.1); padding: 8px 16px; border-radius: 12px; border: 1px solid rgba(16, 185, 129, 0.2); }

        .view { display: none; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .view.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* --- UI CARDS & GRIDS --- */
        .card { background: var(--card-glass); backdrop-filter: blur(20px); border-radius: 20px; padding: 22px; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .label-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 11px; color: var(--dim); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        
        .four-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .small-stat { background: rgba(255,255,255,0.02); padding: 18px; border-radius: 16px; border: 1px solid var(--border); transition: 0.3s; }
        .small-stat:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.1); }
        .val-large { font-size: 22px; font-weight: 800; margin-top: 5px;}

        .TRADING JOURNAL-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
        
        .history-strip { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .history-strip::-webkit-scrollbar { display: none; }
        .trade-tile { min-width: 160px; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 16px; border-left: 3px solid var(--accent); }
        .tile-win { border-left-color: var(--green); background: linear-gradient(90deg, rgba(16,185,129,0.05) 0%, transparent 100%); }
        .tile-loss { border-left-color: var(--red); background: linear-gradient(90deg, rgba(239,68,68,0.05) 0%, transparent 100%); }

        /* --- FORM ELEMENTS --- */
        input, select, textarea { 
            width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border); 
            padding: 16px; border-radius: 12px; color: white; font-size: 15px; margin-bottom: 15px; 
            transition: 0.3s; outline: none; 
        }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124, 115, 230, 0.15); }
        
        .toggle-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
        .btn-toggle { padding: 16px; border-radius: 12px; border: 1px solid var(--border); font-weight: 700; cursor: pointer; background: rgba(255,255,255,0.03); color: var(--dim); transition: 0.3s; }
        .active-long { background: rgba(16, 185, 129, 0.1) !important; color: var(--green) !important; border-color: var(--green) !important; }
        .active-short { background: rgba(239, 68, 68, 0.1) !important; color: var(--red) !important; border-color: var(--red) !important; }
        .active-ongoing { border-color: var(--accent) !important; color: var(--accent) !important; }
        .active-finished { background: #fff !important; color: #000 !important; border-color: #fff !important; }
        
        .save-btn { background: #fff; color: #000; width: 100%; padding: 18px; border-radius: 14px; font-weight: 800; font-size: 16px; border: none; cursor: pointer; transition: 0.3s; }
        .save-btn:active { transform: scale(0.98); }

        /* --- JOURNAL LOG --- */
        .journal-card { display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .journal-card::before { content: ''; position: absolute; left: 0; top: 0; width: 4px; height: 100%; background: #444; }
        .journal-card.profit::before { background: var(--green); }
        .journal-card.loss::before { background: var(--red); }
        
        .del-btn { position: absolute; top: 15px; right: 15px; background: rgba(239,68,68,0.1); color: var(--red); border: none; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; }
        .trade-specs { display: flex; flex-wrap: wrap; gap: 15px; font-size: 12px; color: var(--dim); border-top: 1px solid var(--border); padding-top: 12px; margin-top: 10px; }

        /* --- TOAST NOTIFICATION --- */
        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 12px 24px; border-radius: 30px; font-weight: 700; transition: 0.4s; z-index: 9999; box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4); }
        #toast.show { bottom: 100px; }

        /* =========================================
           MOBILE RESPONSIVENESS (MOBILE APP FEEL)
        ========================================= */
        @media (max-width: 768px) {
            .sidebar { 
                width: 100%; height: 75px; flex-direction: row; justify-content: space-around; 
                top: auto; bottom: 0; border-right: none; border-top: 1px solid var(--border); 
                padding: 0 10px; padding-bottom: env(safe-area-inset-bottom); /* iPhone X support */
            }
            .side-logo { display: none; }
            .nav-item { margin: 0; height: 60px; font-size: 22px; align-items: center; }
            .nav-item.active::after { 
                top: 0; left: 50%; transform: translateX(-50%); 
                width: 30px; height: 3px; border-radius: 0 0 4px 4px; 
            }
            .main-content { margin-left: 0; width: 100%; padding: 20px 15px 100px 15px; }
            .four-grid { grid-template-columns: 1fr 1fr; }
            .TRADING JOURNAL-grid { grid-template-columns: 1fr; }
            .top-header { flex-direction: column; align-items: flex-start; gap: 10px; }
            .top-fund-display { align-self: flex-start; }
            #toast.show { bottom: 90px; } /* Above mobile nav */
        }
    </style>
</head>
<body>

    <!-- Mobile Bottom Nav / Desktop Sidebar -->
    <nav class="sidebar">
        <svg class="side-logo" viewBox="0 0 24 24"><path d="M3.5,18.5L9.5,12.5L13.5,16.5L22,6.92L20.59,5.5L13.5,13.5L9.5,9.5L2,17L3.5,18.5Z" /></svg>
        <button class="nav-item active" onclick="showTab('home', this)">📊</button>
        <button class="nav-item" onclick="showTab('add', this)">✍️</button>
        <button class="nav-item" onclick="showTab('log', this)">📖</button>
        <button class="nav-item" onclick="resetData()" style="font-size: 18px;">⚙️</button>
    </nav>

    <main class="main-content">
        <header class="top-header">
            <div class="brand-section">
                <h1 id="dynamic-title">TRADING JOURNAL</h1>
                <div id="dynamic-quote" class="brand-quote">Trade the plan, not the emotion.</div>
            </div>
            <div id="top-fund-display" class="top-fund-display">₹10,000</div>
        </header>

        <!-- TRADING JOURNAL VIEW -->
        <div id="view-home" class="view active">
            <div class="card" style="text-align:center; border: 1px solid var(--gold); background: linear-gradient(180deg, rgba(255,207,64,0.08) 0%, transparent 100%); padding: 30px;">
                <div class="label-row" style="justify-content:center; color: var(--gold)">Available Capital</div>
                <div id="main-balance" style="font-size:48px; font-weight:800; color:#fff; letter-spacing: -1px;">₹10,000</div>
            </div>

            <div class="four-grid">
                <div class="small-stat"><div class="label-row">Trades</div><div id="stat-total" class="val-large">0</div></div>
                <div class="small-stat"><div class="label-row">Win Rate</div><div id="stat-win" class="val-large" style="color:var(--green)">0%</div></div>
                <div class="small-stat"><div class="label-row">Profit Factor</div><div id="stat-pf" class="val-large" style="color:var(--accent)">0.0</div></div>
                <div class="small-stat"><div class="label-row">Net P&L</div><div id="stat-net" class="val-large">₹0</div></div>
            </div>

            <div class="TRADING JOURNAL-grid">
                <div class="card" style="height: 320px; padding-bottom: 40px;">
                    <div class="label-row" style="color:var(--gold)">Equity Curve</div>
                    <canvas id="equityChart"></canvas>
                </div>
                <div style="display: flex; flex-direction: column; gap: 20px;">
                    <div class="card" style="flex: 1;">
                        <div class="label-row" style="color:var(--accent)">Latest Lesson</div>
                        <div id="home-lesson" style="font-size: 14px; color: #ddd; line-height: 1.5; font-weight: 500;">No lessons logged yet.</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="label-row" style="color:var(--accent); justify-content: space-between;">
                    <span>Recent Activity</span>
                    <span style="font-size: 10px; cursor: pointer; color: var(--text);" onclick="showTab('log', document.querySelectorAll('.nav-item')[2])">VIEW ALL ➔</span>
                </div>
                <div class="history-strip" id="home-history-strip"></div>
            </div>
        </div>

        <!-- ADD TRADE VIEW -->
        <div id="view-add" class="view">
            <div class="card" style="max-width: 600px; margin: 0 auto;">
                <div class="label-row">Market / Asset</div>
                <select id="t-market">
                    <option>Bitcoin (BTC/USDT) ₿</option>
                    <option>Ethereum (ETH/USDT) 💎</option>
                    <option>Gold (XAU/USD) 🏆</option>
                    <option>NIFTY 50 📈</option>
                    <option>BANKNIFTY 🏦</option>
                    <option>Forex / Stocks</option>
                </select>

                <div class="toggle-row">
                    <button class="btn-toggle active-long" id="btn-long" onclick="setSide('LONG')">🟢 LONG</button>
                    <button class="btn-toggle" id="btn-short" onclick="setSide('SHORT')">🔴 SHORT</button>
                </div>
                <div class="toggle-row">
                    <button class="btn-toggle active-ongoing" id="btn-ongoing" onclick="setStatus('ONGOING')">⏱️ ONGOING</button>
                    <button class="btn-toggle" id="btn-finished" onclick="setStatus('FINISHED')">✅ FINISHED</button>
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                    <div><label class="label-row">Lot Size / Qty</label><input type="number" step="any" id="t-qty" class="clearable" placeholder="e.g. 0.5"></div>
                    <div><label class="label-row">Fees / Brokerage</label><input type="number" step="any" id="t-fees" class="clearable" placeholder="₹ 0.00"></div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                    <div><label class="label-row">Setup / Strategy</label><input type="text" id="t-strat" class="clearable" placeholder="e.g. Breakout"></div>
                    <div><label class="label-row">Emotion</label><select id="t-emotion"><option>Calm 🧘‍♂️</option><option>FOMO 😰</option><option>Greedy 🤑</option><option>Revenge 😡</option></select></div>
                </div>

                <label class="label-row">Lessons / Mistakes</label>
                <textarea id="t-notes" class="clearable" rows="3" placeholder="Why did you take this trade? What did you learn?"></textarea>

                <div id="outcome-box" style="background: rgba(255,255,255,0.03); padding: 20px; border-radius: 16px; border: 1px solid var(--border); margin-top: 10px; display: none;">
                    <div class="label-row">Trade Outcome (Manual)</div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div><label class="label-row" style="color:var(--green)">➕ Gross Profit</label><input type="number" step="any" id="t-profit" class="clearable" placeholder="₹" style="border-color:rgba(16,185,129,0.3)"></div>
                        <div><label class="label-row" style="color:var(--red)">➖ Gross Loss</label><input type="number" step="any" id="t-loss" class="clearable" placeholder="₹" style="border-color:rgba(239,68,68,0.3)"></div>
                    </div>
                </div>

                <button class="save-btn" style="margin-top: 25px;" onclick="saveTrade()">COMMIT TO JOURNAL</button>
            </div>
        </div>

        <!-- JOURNAL LOG VIEW -->
        <div id="view-log" class="view">
            <div id="journal-container" style="max-width: 800px; margin: 0 auto;"></div>
        </div>
    </main>

    <div id="toast">Trade Saved Successfully!</div>

    <script>
        // Data Initialization
        let fund = parseFloat(localStorage.getItem('tj_elite_fund')) || 10000;
        let trades = JSON.parse(localStorage.getItem('tj_elite_trades')) ||[];
        let side = 'LONG'; let status = 'ONGOING';

        // --- Navigation ---
        function showTab(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            if(btn) btn.classList.add('active');

            const title = document.getElementById('dynamic-title');
            const quote = document.getElementById('dynamic-quote');

            if(id === 'log') {
                title.innerText = "Trade History";
                quote.innerText = "Review past data to build future consistency.";
                renderJournal();
            } else if(id === 'add') {
                title.innerText = "New Entry";
                quote.innerText = "Plan the trade, trade the plan.";
            } else {
                title.innerText = "TRADING JOURNAL";
                quote.innerText = "Focus on execution, not the money.";
                renderHome();
            }
            window.scrollTo(0,0);
        }

        // --- Form Toggles ---
        function setSide(s) {
            side = s;
            document.getElementById('btn-long').classList.toggle('active-long', s === 'LONG');
            document.getElementById('btn-short').classList.toggle('active-short', s === 'SHORT');
        }

        function setStatus(s) {
            status = s;
            document.getElementById('btn-ongoing').classList.toggle('active-ongoing', s === 'ONGOING');
            document.getElementById('btn-finished').classList.toggle('active-finished', s === 'FINISHED');
            document.getElementById('outcome-box').style.display = s === 'FINISHED' ? 'block' : 'none';
        }

        // --- Core Logic ---
        function saveTrade() {
            const p = parseFloat(document.getElementById('t-profit').value) || 0;
            const l = parseFloat(document.getElementById('t-loss').value) || 0;
            const fees = parseFloat(document.getElementById('t-fees').value) || 0;
            let net = 0;
            
            if(status === 'FINISHED') { net = p - l - fees; }

            const entry = {
                id: Date.now(), // Unique ID for deleting
                market: document.getElementById('t-market').value,
                pnl: net, grossP: p, grossL: l, fees: fees,
                side: side, status: status,
                strat: document.getElementById('t-strat').value || 'Price Action',
                emotion: document.getElementById('t-emotion').value,
                note: document.getElementById('t-notes').value || 'No specific notes.',
                date: new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute:'2-digit' })
            };

            trades.push(entry);
            if(status === 'FINISHED') fund += net;
            
            saveToStorage();
            
            document.querySelectorAll('.clearable').forEach(i => i.value = '');
            showToast("Trade Saved Successfully!");
            showTab('home', document.querySelectorAll('.nav-item')[0]);
        }

        function deleteTrade(id) {
            if(!confirm("Delete this entry forever?")) return;
            const index = trades.findIndex(t => t.id === id);
            if(index > -1) {
                if(trades[index].status === 'FINISHED') {
                    fund -= trades[index].pnl; // revert funds
                }
                trades.splice(index, 1);
                saveToStorage();
                renderJournal();
                showToast("Trade Deleted");
            }
        }

        function saveToStorage() {
            localStorage.setItem('tj_elite_fund', fund);
            localStorage.setItem('tj_elite_trades', JSON.stringify(trades));
        }

        // --- Rendering ---
        function renderHome() {
            document.getElementById('top-fund-display').innerText = `₹${fund.toLocaleString()}`;
            document.getElementById('main-balance').innerText = `₹${fund.toLocaleString()}`;
            
            const closed = trades.filter(t => t.status === 'FINISHED');
            document.getElementById('stat-total').innerText = closed.length;
            
            const wins = closed.filter(t => t.pnl > 0);
            document.getElementById('stat-win').innerText = closed.length ? Math.round((wins.length / closed.length) * 100) + '%' : '0%';
            
            document.getElementById('stat-net').innerText = `₹${closed.reduce((a, b) => a + b.pnl, 0).toFixed(0)}`;

            // Advanced Profit Factor Math
            let grossProfits = closed.reduce((acc, t) => acc + (t.grossP || 0), 0);
            let grossLosses = closed.reduce((acc, t) => acc + (t.grossL || 0), 0);
            let pf = grossLosses === 0 ? (grossProfits > 0 ? '∞' : '0.0') : (grossProfits / grossLosses).toFixed(2);
            document.getElementById('stat-pf').innerText = pf;

            const lastLesson = trades.slice().reverse().find(t => t.note && t.note !== 'No specific notes.');
            document.getElementById('home-lesson').innerText = lastLesson ? `"${lastLesson.note}"` : "Add a trade to see your latest lesson here.";
            
            const strip = document.getElementById('home-history-strip');
            if(trades.length === 0) { strip.innerHTML = `<div style="color:var(--dim); font-size: 13px;">No history yet.</div>`; }
            else {
                strip.innerHTML = trades.slice(-6).reverse().map(t => `
                    <div class="trade-tile ${t.status === 'FINISHED' ? (t.pnl > 0 ? 'tile-win' : 'tile-loss') : ''}">
                        <div style="font-size: 10px; color: var(--dim)">${t.date.split(',')[0]}</div>
                        <div style="font-weight: 800; font-size: 15px; margin: 6px 0;">${t.market.split(' ')[0]}</div>
                        <div style="font-weight: 700; color: ${t.pnl > 0 ? 'var(--green)' : (t.pnl < 0 ? 'var(--red)' : '#fff')}">${t.status === 'ONGOING' ? '⏱️ LIVE' : (t.pnl > 0 ? '+' : '') + '₹' + t.pnl.toFixed(0)}</div>
                    </div>`).join('');
            }
            renderChart();
        }

        function renderJournal() {
            const container = document.getElementById('journal-container');
            if(trades.length === 0) { container.innerHTML = `<p style="color:var(--dim); text-align:center;">Your journal is empty.</p>`; return; }
            
            container.innerHTML = trades.slice().reverse().map(t => `
                <div class="card journal-card ${t.status === 'FINISHED' ? (t.pnl > 0 ? 'profit' : 'loss') : ''}">
                    <button class="del-btn" onclick="deleteTrade(${t.id})">Delete</button>
                    <div style="display:flex; justify-content:space-between; margin-bottom: 8px;">
                        <span style="font-size:11px; color:var(--dim); background:rgba(255,255,255,0.05); padding:4px 10px; border-radius:8px;">${t.date}</span>
                        <div style="font-weight:900; font-size:22px; color:${t.pnl > 0 ? 'var(--green)' : (t.pnl < 0 ? 'var(--red)' : '#fff')}">${t.status === 'ONGOING' ? '⏱️ LIVE' : '₹' + t.pnl.toFixed(2)}</div>
                    </div>
                    <div style="font-size: 16px; font-weight: 700; color:#fff;">${t.side} - ${t.market}</div>
                    <div style="font-size: 14px; font-weight: 500; color: #ddd; line-height: 1.5; margin: 12px 0;">📝 "${t.note}"</div>
                    <div class="trade-specs">
                        <div><b>STRATEGY:</b> ${t.strat}</div>
                        <div><b>EMOTION:</b> ${t.emotion}</div>
                        <div><b>FEES:</b> ₹${t.fees || 0}</div>
                    </div>
                </div>`).join('');
        }

        function renderChart() {
            const ctx = document.getElementById('equityChart').getContext('2d');
            if(window.ch) window.ch.destroy();
            let b = 10000;
            const history =[10000, ...trades.filter(t => t.status === 'FINISHED').map(t => b += t.pnl)];
            
            // Limit to last 30 trades for cleaner mobile view
            const displayHistory = history.slice(-30); 

            // Create Gradient
            let gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(255, 207, 64, 0.4)');
            gradient.addColorStop(1, 'rgba(255, 207, 64, 0.0)');

            window.ch = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: displayHistory.map((_, i) => i),
                    datasets:[{ 
                        data: displayHistory, borderColor: '#ffcf40', borderWidth: 3, tension: 0.3, fill: true, backgroundColor: gradient, pointRadius: 0, pointHitRadius: 20
                    }]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false, 
                    plugins: { legend: {display: false}, tooltip: { mode: 'index', intersect: false } }, 
                    scales: { x: {display: false}, y: {grid: {color: 'rgba(255,255,255,0.05)'}, ticks: { color: '#8e8e93' }} },
                    interaction: { mode: 'nearest', axis: 'x', intersect: false }
                }
            });
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function resetData() { 
            if(confirm("⚙️ Are you sure you want to completely clear all local data? This cannot be undone.")) { 
                localStorage.removeItem('tj_elite_fund');
                localStorage.removeItem('tj_elite_trades');
                location.reload(); 
            } 
        }
        
        // Initialize
        window.onload = () => { setStatus('ONGOING'); renderHome(); };
    </script>
</body>
</html>
